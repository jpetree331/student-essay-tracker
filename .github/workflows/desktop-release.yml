# Builds Windows + Mac installers for the desktop app and attaches them to a
# GitHub release. Trigger by pushing a tag like desktop-v0.1.0, or manually
# from the Actions tab.
name: desktop-release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest # builds a universal-ish arm64 .dmg; add args for x86_64 if needed
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Science Writing Tracker ${{ github.ref_name }}'
          releaseBody: >
            Desktop installers. Windows: run the .exe installer (click through
            SmartScreen via "More info → Run anyway"). Mac: open the .dmg,
            drag to Applications, then right-click the app → Open the first
            time (unsigned build).
          releaseDraft: true
